name: build

on:
  workflow_dispatch:
    inputs:
      commitHash:
        description: 'inline-chat/webrtc commit hash'
        default: ''
        required: true
      configuration:
        description: 'build configuration'
        default: 'release'
        required: true
        type: choice
        options:
          - release
          - debug
permissions:
  contents: read
  actions: read

jobs:
  build-apple:
    defaults:
      run:
        working-directory: ./build
    strategy:
      fail-fast: false
      matrix:
        name:
          - apple_prefixed
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v5
    - name: Select Xcode 26.0
      run: sudo xcode-select --switch /Applications/Xcode_26.0.app/Contents/Developer
    - name: Build
      id: build
      run: ./build.${{ matrix.name }}.sh "${{ github.event.inputs.commitHash }}" "${{ github.event.inputs.configuration || 'release' }}"
    - name: Test native typing suppression
      run: |
        export PATH="$PWD/_source/apple_prefixed/depot_tools:$PATH"
        source_dir="$PWD/_source/apple_prefixed/webrtc/src"
        out_dir="$PWD/_package/apple_prefixed/transient-tests"
        mkdir -p "$PWD/_package/resources/audio_processing"
        cp -R \
          "$source_dir/resources/audio_processing/transient" \
          "$PWD/_package/resources/audio_processing/"
        cd "$source_dir"
        gn gen "$out_dir" --args='
          is_component_build=false
          is_debug=false
          mac_deployment_target="10.15"
          rtc_build_examples=false
          rtc_enable_protobuf=false
          rtc_include_tests=true
          rtc_use_h264=false
          target_cpu="arm64"
          target_os="mac"
          treat_warnings_as_errors=true
          use_rtti=true'
        ninja -C "$out_dir" transient_suppression_unittests_runner -j 6 --quiet
        "$out_dir/transient_suppression_unittests_runner"
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.framework_name }}.xcframework.zip
        path: build/_package/${{ matrix.name }}/${{ steps.build.outputs.framework_name }}.xcframework.zip
