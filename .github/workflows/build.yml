name: build

on:
  workflow_dispatch:
    inputs:
      commitHash:
        description: 'inline-chat/webrtc commit hash'
        default: ''
        required: true
      configuration:
        description: 'build configuration'
        default: 'release'
        required: true
        type: choice
        options:
          - release
          - debug
permissions:
  contents: read
  actions: read

jobs:
  build-apple:
    defaults:
      run:
        working-directory: ./build
    strategy:
      fail-fast: false
      matrix:
        name:
          - apple_prefixed
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v5
    - name: Select Xcode 26.0
      run: sudo xcode-select --switch /Applications/Xcode_26.0.app/Contents/Developer
    - name: Build
      id: build
      run: ./build.${{ matrix.name }}.sh "${{ github.event.inputs.commitHash }}" "${{ github.event.inputs.configuration || 'release' }}"
    - name: Test native audio hardening
      run: |
        export PATH="$PWD/_source/apple_prefixed/depot_tools:$PATH"
        source_dir="$PWD/_source/apple_prefixed/webrtc/src"
        out_dir="$PWD/_package/apple_prefixed/audio-tests"
        cd "$source_dir"
        gn gen "$out_dir" --args='
          is_component_build=false
          is_debug=false
          mac_deployment_target="10.15"
          rtc_build_examples=false
          rtc_enable_protobuf=false
          rtc_include_tests=true
          rtc_use_h264=false
          target_cpu="arm64"
          target_os="mac"
          fatal_linker_warnings=false
          treat_warnings_as_errors=false
          use_clang_modules=false
          use_custom_libcxx=false
          use_lld=false
          use_rtti=true
          use_siso=false'
        ninja -C "$out_dir" modules_unittests audio_transport_impl_unittests -j 6 --quiet
        "$out_dir/modules_unittests" --gtest_filter=FineBufferTest.*
        "$out_dir/audio_transport_impl_unittests" --gtest_filter=AudioTransportImplTest.*
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.framework_name }}.xcframework.zip
        path: build/_package/${{ matrix.name }}/${{ steps.build.outputs.framework_name }}.xcframework.zip
